<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoC Challenge Overlay</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: Arial, 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.challenge-grid {
  display: grid;
  grid-template-columns: repeat(var(--cols, 8), 1fr);
  border-top: 2px solid #000;
  border-left: 2px solid #000;
  width: 100%;
}

.card {
  border-right: 2px solid #000;
  border-bottom: 2px solid #000;
  display: flex;
  flex-direction: column;
  min-height: 90px;
}

.card-title {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-weight: 700;
  font-size: 13px;
  line-height: 1.25;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-nums {
  display: flex;
  border-top: 2px solid #000;
}
.card-nums .n {
  flex: 1;
  text-align: center;
  padding: 3px 4px;
  font-weight: 700;
  font-size: 15px;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
}
.card-nums .n:first-child { border-right: 2px solid #000; }

.card-bar { height: 10px; border-top: 2px solid #000; background: rgba(0,0,0,0.25); }
.card-bar-fill { height: 100%; transition: width 0.4s ease; }

.s-red    { background: #cc1111; }
.s-red    .card-bar-fill { background: #ff7777; }
.s-yellow { background: #b07a00; }
.s-yellow .card-bar-fill { background: #ffd700; }
.s-green  { background: #117a11; }
.s-green  .card-bar-fill { background: #55ee55; }
.s-hidden { background: #5c1a00; }

.bottom {
  background: rgba(0,0,0,0.75);
  border-top: 2px solid #000;
  padding: 10px 16px 12px;
}
.pts-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.pts-label { font-size: 22px; font-weight: 700; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
.pts-bar-track { height: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.pts-bar-fill { height: 100%; background: rgba(255,255,255,0.35); transition: width 0.5s ease; }
</style>
</head>
<body>

<div class="challenge-grid" id="grid"></div>
<div class="bottom">
  <div class="pts-row">
    <span class="pts-label" id="pts-earned">0</span>
    <span class="pts-label" id="pts-total">0</span>
  </div>
  <div class="pts-bar-track"><div class="pts-bar-fill" id="pts-bar" style="width:0%"></div></div>
</div>

<script>
const cols = parseInt(new URLSearchParams(location.search).get('cols')) || 8;
document.documentElement.style.setProperty('--cols', cols);

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function cardStatus(c) {
  if (c.hidden) return 'hidden';
  if (c.current >= c.total) return 'green';
  if (c.current > 0) return 'yellow';
  return 'red';
}

function render(data) {
  const ch = data.challenges || {};
  const challenges = Object.entries(ch)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([id, c]) => ({ id, ...c }));

  document.getElementById('grid').innerHTML = challenges.map(c => {
    const status = cardStatus(c);
    const isHidden = status === 'hidden';
    const pct = !isHidden && c.total > 0 ? Math.min(100, Math.round(c.current / c.total * 100)) : 0;
    return `
      <div class="card s-${status}">
        <div class="card-title">${isHidden ? 'Not Revealed Yet' : esc(c.name)}</div>
        <div class="card-nums">
          <span class="n">${isHidden ? 0 : c.current}</span>
          <span class="n">${isHidden ? 1 : c.total}</span>
        </div>
        <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');

  const visible = challenges.filter(c => !c.hidden);
  const ptsEarned = visible.filter(c => c.current >= c.total).reduce((s,c) => s + c.points, 0);
  const ptsTotal = visible.reduce((s,c) => s + c.points, 0);
  const pct = ptsTotal > 0 ? Math.round(ptsEarned / ptsTotal * 100) : 0;
  document.getElementById('pts-earned').textContent = ptsEarned.toLocaleString();
  document.getElementById('pts-total').textContent = ptsTotal.toLocaleString();
  document.getElementById('pts-bar').style.width = pct + '%';
}

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

async function refresh() {
  try {
    const snap = await db.ref('/').once('value');
    render(snap.val() || {});
  } catch(e) {}
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
